<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AI 题库刷题</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>AI 题库刷题</h1>
      <p id="metaText">加载中...</p>
    </header>

    <section class="tabs">
      <button class="tab active" data-tab="practice">无限刷题</button>
      <button class="tab" data-tab="test">测试模式</button>
      <button class="tab" data-tab="wrong">错题本</button>
      <button class="tab" data-tab="manage">答案管理</button>
    </section>

    <section id="panelPractice" class="panel active">
      <div id="practiceStats" class="result"></div>
      <div id="practiceContainer"></div>
      <div class="actions">
        <button id="practiceNextBtn">下一题</button>
      </div>
    </section>

    <section id="panelTest" class="panel">
      <div class="toolbar">
        <label><input id="testOnlyWrong" type="checkbox" /> 仅测错题本</label>
        <button id="testStartBtn">开始测试</button>
      </div>
      <div id="testContainer"></div>
      <div id="testResult" class="result"></div>
      <div class="bottom-submit-wrap">
        <button id="testSubmitBtn" disabled>交卷</button>
      </div>
    </section>

    <section id="panelWrong" class="panel">
      <div class="toolbar">
        <button id="wrongStartPracticeBtn">按错题本刷题</button>
        <button id="wrongClearBtn" class="danger">清空错题本</button>
      </div>
      <div id="wrongContainer"></div>
    </section>

    <section id="panelManage" class="panel">
      <div class="toolbar">
        <button id="exportAnswersBtn">导出答案 JSON</button>
      </div>
      <div class="card" style="margin-bottom:10px;">
        <p class="hint">云端同步（跨设备）：使用 GitHub Gist 存储答案库。</p>
        <input id="gistIdInput" type="text" placeholder="Gist ID（例如 8f3a...）" />
        <input id="gistTokenInput" type="password" placeholder="GitHub Token（需 gist 权限，用于推送）" />
        <div class="actions" style="margin-top:8px;">
          <button id="saveSyncConfigBtn">保存云端配置</button>
          <button id="pullCloudAnswersBtn">拉取云端答案</button>
          <button id="pushCloudAnswersBtn">推送到云端</button>
        </div>
        <div id="syncMessage" class="result"></div>
      </div>
      <p class="hint">导入格式示例：{"1":["B"],"2":["A","C"]}。键是题号，值是正确选项数组。</p>
      <textarea id="answersInput" rows="8" placeholder='粘贴答案 JSON'></textarea>
      <div class="actions">
        <button id="importAnswersBtn">导入答案</button>
      </div>
      <div id="manageMessage" class="result"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
