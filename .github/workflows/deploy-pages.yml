name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static bundle
        run: |
          set -e
          echo "Repository root contents:"
          ls -la
          mkdir -p dist
          missing=""
          for f in index.html app.js styles.css questions.json; do
            if [ ! -f "$f" ]; then
              missing="$missing $f"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::缺少网站文件（仓库根目录找不到）:$missing"
            echo "请把刷题项目的 index.html、app.js、styles.css、questions.json 放到仓库根目录并 push，再重新运行 workflow。"
            exit 1
          fi
          cp index.html app.js styles.css questions.json dist/
          if [ -f vercel.json ]; then cp vercel.json dist/; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
